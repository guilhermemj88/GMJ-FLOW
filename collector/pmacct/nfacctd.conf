! GMJ-FLOW lab NetFlow/IPFIX collector.
! Receives NetFlow v9/IPFIX from MikroTik 192.168.0.157 on UDP/9995.

! General daemon settings
debug: false
daemonize: false
log_stderr_tstamp: true
files_umask: 002

! NetFlow/IPFIX listener
nfacctd_ip: 0.0.0.0
nfacctd_port: 9995
nfacctd_allow_file: /etc/pmacct/allow.lst
nfacctd_time_secs: true
nfacctd_time_new: true
timestamps_secs: true
timestamps_utc: true

! Print plugin. CSV is used because some distro packages do not ship JSON support.
plugins: print[flows]
aggregate[flows]: src_host, dst_host, src_port, dst_port, proto, tcpflags, in_iface, out_iface, timestamp_start
print_output[flows]: csv
print_output_file[flows]: /var/spool/pmacct/nfacctd.csv
print_output_file_append[flows]: true
print_history[flows]: 5s
print_refresh_time[flows]: 5
print_startup_delay[flows]: 1

! Fallback field order when pmacct does not emit a CSV header:
! src_host,dst_host,src_port,dst_port,proto,tcpflags,in_iface,out_iface,timestamp,packets,bytes,flows