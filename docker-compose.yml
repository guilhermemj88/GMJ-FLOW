services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: gmj-flow-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE-flowdb}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_HTTP_PORT-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: gmj-flow-backend
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE-flowdb}
      CLICKHOUSE_CONNECT_TIMEOUT_SECONDS: "${CLICKHOUSE_CONNECT_TIMEOUT_SECONDS-5}"
      CLICKHOUSE_QUERY_TIMEOUT_SECONDS: "${CLICKHOUSE_QUERY_TIMEOUT_SECONDS-30}"
      CLICKHOUSE_ADMIN_TIMEOUT_SECONDS: "${CLICKHOUSE_ADMIN_TIMEOUT_SECONDS-300}"
      API_CORS_ORIGINS: "${API_CORS_ORIGINS-*}"
      GMJFLOW_DB_PATH: "${GMJFLOW_DB_PATH-/app/data/gmjflow.db}"
      GMJFLOW_AUTH_SECRET: "${GMJFLOW_AUTH_SECRET-gmj-flow-dev-secret-change-me}"
      GMJFLOW_RUNTIME_DIR: "${GMJFLOW_RUNTIME_DIR-/app/runtime}"
      GMJFLOW_COLLECTORS_DIR: "${GMJFLOW_COLLECTORS_DIR-/app/runtime/data/collectors}"
      GMJFLOW_COLLECTOR_APPLY_SCRIPT: "${GMJFLOW_COLLECTOR_APPLY_SCRIPT-/app/runtime/scripts/apply_collectors.sh}"
      GMJFLOW_ENABLE_COLLECTOR_APPLY: "${GMJFLOW_ENABLE_COLLECTOR_APPLY-false}"
      GMJFLOW_SNMP_POLLING_ENABLED: "${GMJFLOW_SNMP_POLLING_ENABLED-1}"
      GMJFLOW_CALIBRATION_MIN_BPS: "${GMJFLOW_CALIBRATION_MIN_BPS-10000}"
      GMJFLOW_CALIBRATION_MIN_CONFIDENCE: "${GMJFLOW_CALIBRATION_MIN_CONFIDENCE-0.6}"
      GMJFLOW_MAX_RANGE_MINUTES: "${GMJFLOW_MAX_RANGE_MINUTES-259200}"
      GMJFLOW_ANOMALY_DETECTION_ENABLED: "${GMJFLOW_ANOMALY_DETECTION_ENABLED-true}"
      GMJFLOW_ANOMALY_INTERVAL_SECONDS: "${GMJFLOW_ANOMALY_INTERVAL_SECONDS-30}"
      GMJFLOW_ANOMALY_LOOKBACK_SECONDS: "${GMJFLOW_ANOMALY_LOOKBACK_SECONDS-60}"
      GMJFLOW_ANOMALY_MIN_DURATION_SECONDS: "${GMJFLOW_ANOMALY_MIN_DURATION_SECONDS-30}"
      GMJFLOW_ANOMALY_CLOSE_AFTER_SECONDS: "${GMJFLOW_ANOMALY_CLOSE_AFTER_SECONDS-120}"
      GMJFLOW_ASN_RESOLVER_ENABLED: "${GMJFLOW_ASN_RESOLVER_ENABLED-true}"
      GMJFLOW_ASN_RESOLVER_BATCH_SIZE: "${GMJFLOW_ASN_RESOLVER_BATCH_SIZE-20}"
      GMJFLOW_ASN_RESOLVER_INTERVAL_SECONDS: "${GMJFLOW_ASN_RESOLVER_INTERVAL_SECONDS-30}"
      GMJFLOW_ASN_RESOLVER_TIMEOUT_SECONDS: "${GMJFLOW_ASN_RESOLVER_TIMEOUT_SECONDS-10}"
      GMJFLOW_ASN_RESOLVER_MAX_ATTEMPTS: "${GMJFLOW_ASN_RESOLVER_MAX_ATTEMPTS-3}"
      GMJFLOW_ASN_CACHE_TTL_DAYS: "${GMJFLOW_ASN_CACHE_TTL_DAYS-30}"
      GMJFLOW_GEOIP_MMDB_PATH: "${GMJFLOW_GEOIP_MMDB_PATH-/app/data/GeoLite2-City.mmdb}"
      PMACCT_STATE_DIR: "${PMACCT_STATE_DIR-/var/spool/pmacct/state}"
    ports:
      - "${BACKEND_PORT-8000}:8000"
    volumes:
      - ./data/backend:/app/data
      - ./:/app/runtime
      - pmacct_spool:/var/spool/pmacct:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      clickhouse:
        condition: service_healthy

  frontend:
    image: nginx:1.27-alpine
    container_name: gmj-flow-frontend
    ports:
      - "${FRONTEND_PORT-8080}:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  pmacct:
    build:
      context: ./collector/pmacct
    container_name: gmj-flow-pmacct
    ports:
      - "${NETFLOW_PORT-9995}:9995/udp"
    volumes:
      - pmacct_spool:/var/spool/pmacct
    restart: unless-stopped

  pmacct-parser:
    build:
      context: ./collector/pmacct
    container_name: gmj-flow-pmacct-parser
    command: ["python3", "/opt/gmj-flow/parse_pmacct.py"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE-flowdb}
      PMACCT_SENSOR: "${PMACCT_SENSOR-mikrotik-lab}"
      PMACCT_EXPORTER_IP: "${PMACCT_EXPORTER_IP-192.168.0.157}"
      PMACCT_OUTPUT_FILE: "${PMACCT_OUTPUT_FILE-/var/spool/pmacct/nfacctd.csv}"
      PMACCT_OUTPUT_FORMAT: "${PMACCT_OUTPUT_FORMAT-csv}"
      PMACCT_CSV_DELIMITER: "${PMACCT_CSV_DELIMITER-,}"
      PMACCT_CSV_FIELDS: "${PMACCT_CSV_FIELDS-src_as,dst_as,in_iface,out_iface,src_host,dst_host,src_port,dst_port,tcpflags,proto,timestamp_start,packets,bytes}"
      PMACCT_SAMPLE_RATE: "${PMACCT_SAMPLE_RATE-1}"
      PMACCT_PARSER_BATCH_SIZE: "${PMACCT_PARSER_BATCH_SIZE-1000}"
      PMACCT_PARSER_FLUSH_SECONDS: "${PMACCT_PARSER_FLUSH_SECONDS-5}"
      PMACCT_STATE_DIR: "${PMACCT_STATE_DIR-/var/spool/pmacct/state}"
      PMACCT_PARSER_START_FROM_END_IF_NO_STATE: "${PMACCT_PARSER_START_FROM_END_IF_NO_STATE-true}"
      GMJFLOW_PMACCT_ROTATE_ENABLED: "${GMJFLOW_PMACCT_ROTATE_ENABLED-true}"
      GMJFLOW_PMACCT_ROTATE_MAX_MB: "${GMJFLOW_PMACCT_ROTATE_MAX_MB-100}"
      GMJFLOW_PMACCT_ROTATE_KEEP_DAYS: "${GMJFLOW_PMACCT_ROTATE_KEEP_DAYS-3}"
      GMJFLOW_PMACCT_ROTATE_COMPRESS: "${GMJFLOW_PMACCT_ROTATE_COMPRESS-true}"
      GMJFLOW_PMACCT_ROTATE_CHECK_SECONDS: "${GMJFLOW_PMACCT_ROTATE_CHECK_SECONDS-30}"
    volumes:
      - pmacct_spool:/var/spool/pmacct
    depends_on:
      clickhouse:
        condition: service_healthy
      pmacct:
        condition: service_started
    restart: unless-stopped

  collector:
    build:
      context: ./collector
    container_name: gmj-flow-collector
    profiles:
      - tools
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE-flowdb}
      FAKE_FLOW_BATCH_SIZE: ${FAKE_FLOW_BATCH_SIZE-1000}
      FAKE_FLOW_INTERVAL_SECONDS: ${FAKE_FLOW_INTERVAL_SECONDS-5}
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  clickhouse_data:
  pmacct_spool:
