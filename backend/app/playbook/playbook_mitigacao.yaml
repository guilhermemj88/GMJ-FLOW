        "dst_ip",
        "protocol",
        "dst_port"
      ],
      "requirements": [
        "src_is_customer",
        "dst_is_external",
        "protocol_known",
        "dst_port_known"
      ],
      "description": "Bloqueio especifico entre cliente e destino externo em uma porta/protocolo."
    },
    "src_customer_32_dst_external_32_udp_dst_port_53": {
